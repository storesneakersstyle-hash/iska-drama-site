<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISKA DRAMA — إعادة تعيين كلمة المرور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#13112A;--surf:#1C1835;--pink:#E91E8C;--purple:#7B2FBE;--gold:#FFD740;--grey:#9E9E9E;--red:#FF4B4B;--green:#00C853;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--surf);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px 32px;width:100%;max-width:420px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.logo{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.icon{font-size:2.8rem;margin-bottom:12px;}
h1{font-size:1.15rem;font-weight:700;margin-bottom:6px;}
.sub{color:var(--grey);font-size:.85rem;margin-bottom:28px;}
input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;margin-bottom:12px;transition:.2s;}
input:focus{border-color:rgba(123,47,190,0.6);}
button{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-weight:700;font-size:.95rem;border:none;cursor:pointer;font-family:'Cairo',sans-serif;transition:.3s;margin-bottom:8px;}
button:hover{opacity:0.9;transform:translateY(-1px);}
button:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.msg{font-size:.85rem;padding:12px;border-radius:10px;margin-top:8px;display:none;}
.msg.ok{background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.3);color:var(--green);}
.msg.err{background:rgba(255,75,75,0.1);border:1px solid rgba(255,75,75,0.3);color:var(--red);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ISKA DRAMA</div>
  <div class="icon">🔐</div>
  <h1>تعيين كلمة مرور جديدة</h1>
  <p class="sub">أدخل كلمة المرور الجديدة لحسابك</p>
  <input type="password" id="pass1" placeholder="كلمة المرور الجديدة" minlength="6"/>
  <input type="password" id="pass2" placeholder="تأكيد كلمة المرور"/>
  <button id="btn" onclick="doReset()">تأكيد التغيير</button>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
  import { getAuth, verifyPasswordResetCode, confirmPasswordReset }
    from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSy...",   // ← ضع مفاتيح مشروعك هنا
    authDomain:        "iska-drama.firebaseapp.com",
    projectId:         "iska-drama",
    storageBucket:     "iska-drama.appspot.com",
    messagingSenderId: "...",
    appId:             "..."
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const params = new URLSearchParams(location.search);
  const oobCode = params.get('oobCode');
  const mode    = params.get('mode');

  if (mode !== 'resetPassword' || !oobCode) {
    document.querySelector('.sub').textContent = 'الرابط غير صالح أو منتهي الصلاحية.';
    document.getElementById('btn').disabled = true;
  }

  window.doReset = async function() {
    const p1 = document.getElementById('pass1').value;
    const p2 = document.getElementById('pass2').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    msg.style.display = 'none';

    if (p1.length < 6) {
      msg.className = 'msg err'; msg.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل.'; msg.style.display = 'block'; return;
    }
    if (p1 !== p2) {
      msg.className = 'msg err'; msg.textContent = 'كلمتا المرور غير متطابقتين.'; msg.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.textContent = 'جارٍ الحفظ...';

    try {
      await verifyPasswordResetCode(auth, oobCode);
      await confirmPasswordReset(auth, oobCode, p1);
      msg.className = 'msg ok';
      msg.textContent = '✅ تم تغيير كلمة المرور بنجاح! يمكنك الآن تسجيل الدخول من التطبيق.';
      msg.style.display = 'block';
      btn.textContent = 'تم ✓';
    } catch (e) {
      msg.className = 'msg err';
      msg.textContent = e.code === 'auth/expired-action-code'
        ? '⚠️ الرابط منتهي الصلاحية. اطلب رابطاً جديداً من التطبيق.'
        : '❌ حدث خطأ. حاول مجدداً أو اطلب رابطاً جديداً.';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'تأكيد التغيير';
    }
  };
</script>
</body>
</html>
